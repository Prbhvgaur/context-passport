name: Deploy Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm icons
      - run: pnpm --filter @context-passport/extension exec jest --coverage --runInBand
      - run: pnpm --filter @context-passport/extension build
      - run: pnpm zip:extension
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-passport-extension
          path: release/context-passport-extension-v1.0.0.zip
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          draft: false
          prerelease: false
          files: release/context-passport-extension-v1.0.0.zip

