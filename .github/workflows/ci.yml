name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @context-passport/backend exec jest --coverage --runInBand
      - run: pnpm --filter @context-passport/extension exec jest --coverage --runInBand
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage
            extension/coverage

